<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Reach me</title>
        <link rel="stylesheet" href="CSS/style-reachme.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,500&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Luxurious+Roman&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300&display=swap" rel="stylesheet">
        <link rel="icon" href="Favicons/icon.ico">

        <script src="https://www.gstatic.com/firebasejs/8.2.3/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.2.3/firebase-database.js"></script>
        <script src="msgbox.js" type="module"></script>
    
      <style>
        html{
        background: linear-gradient(to bottom, #ffd3a5, #fd6585);  /*White on top and gradually pink*/
        height: 100%;
        -webkit-background-size: cover;
        -moz-background-size: cover;
        -o-background-size: cover;
        background-size: cover;
        user-select: none;
      }
      </style>
    
    
    </head>
    <body>
    
      <div class="home-icon">
        <a href="index.html">
          <img class="home-img" src="SVG/home.svg" alt="home">
        </a>
      </div>

    <div class="heading">
        "How to Holla at Ya Boi" - Get in touch with me and drop a message!
    </div>
  
    <div class="message-form">
    
      <div class="input-wrapper">
        <input type="text" id="ip-name" name="name">
        <label for="name">Name</label>
      </div>
      
      <div class="input-wrapper">
        <input type="email" id="ip-mail" name="email">
        <label for="email">Email</label>
      </div>
      
      <div class="textarea-wrapper">
        <label for="name">Message</label>
        <textarea name="message" rows="10" id="ip-msg"></textarea>
      </div>

      <button id="sendButton" type="button">Send</button>

    </div>
</body>
</html>
